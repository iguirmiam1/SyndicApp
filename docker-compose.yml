version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: syndicpro_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-syndicpro}
      POSTGRES_USER: ${POSTGRES_USER:-syndicpro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-syndicpro2026}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./backend/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-syndicpro}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: syndicpro_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4000
      DATABASE_URL: postgres://${POSTGRES_USER:-syndicpro}:${POSTGRES_PASSWORD:-syndicpro2026}@db:5432/${POSTGRES_DB:-syndicpro}
      JWT_SECRET: ${JWT_SECRET:-changeme_super_secret_jwt_key_2026}
      BCRYPT_ROUNDS: 10
    ports:
      - "3000:4000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./frontend:/app/public:ro

volumes:
  pgdata:
